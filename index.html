<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q.co Coffee Lab - Leads Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // Konfigurasi dark mode Tailwind
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        zinc: {
                            850: '#202024',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen p-4 md:p-8">

    <div class="max-w-7xl mx-auto">
        <header class="flex flex-col sm:flex-row justify-between items-start sm:items-center border-b border-zinc-800 pb-6 mb-8 gap-4">
            <div>
                <h1 class="text-2xl font-black tracking-wider text-amber-500">Q.CO LEADS MONITOR</h1>
                <p class="text-sm text-zinc-400 mt-1">Sistem Pemantauan Sales Canvassing & Leads</p>
            </div>
            <div class="flex items-center gap-3">
                <button onclick="fetchLeadsData()" class="bg-zinc-900 hover:bg-zinc-800 text-sm font-medium px-4 py-2 rounded-md border border-zinc-700 text-zinc-200 transition duration-150">
                    Refresh Data
                </button>
            </div>
        </header>

        <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-8">
            <div class="bg-zinc-900 border border-zinc-800 p-5 rounded-lg shadow-sm">
                <div class="text-xs text-zinc-400 font-bold uppercase tracking-wider">Total Data Kunjungan</div>
                <div id="metric-total" class="text-3xl font-bold mt-1 text-zinc-200">-</div>
            </div>
            <div class="bg-zinc-900 border border-zinc-800 p-5 rounded-lg shadow-sm">
                <div class="text-xs text-zinc-400 font-bold uppercase tracking-wider">Status Closing</div>
                <div id="metric-closing" class="text-3xl font-bold mt-1 text-emerald-500">-</div>
            </div>
            <div class="bg-zinc-900 border border-zinc-800 p-5 rounded-lg shadow-sm">
                <div class="text-xs text-zinc-400 font-bold uppercase tracking-wider">Status On Going</div>
                <div id="metric-ongoing" class="text-3xl font-bold mt-1 text-amber-500">-</div>
            </div>
        </div>

        <div class="bg-zinc-900 border border-zinc-800 rounded-lg overflow-hidden shadow-xl">
            <div class="p-4 border-b border-zinc-800 bg-zinc-900/50 flex justify-between items-center">
                <h2 class="text-sm font-bold uppercase tracking-wider text-zinc-400">Daftar Coffee Shop & Progres</h2>
                <div id="loading-indicator" class="text-xs text-amber-500 font-medium animate-pulse">Memuat data dari Google Sheets...</div>
            </div>
            
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-zinc-900 border-b border-zinc-800 text-zinc-400 text-xs font-bold uppercase tracking-wider">
                            <th class="p-4">Tanggal</th>
                            <th class="p-4">Coffee Shop</th>
                            <th class="p-4">Sales</th>
                            <th class="p-4">PIC / Kontak</th>
                            <th class="p-4">Visit</th>
                            <th class="p-4">Status</th>
                        </tr>
                    </thead>
                    <tbody id="leads-table-body" class="divide-y divide-zinc-800 text-sm">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // MASUKKAN URL WEB APP GOOGLE APPS SCRIPT ANDA DI SINI
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfybxw3U7n31U-b072OlyP3g9pQj6G0w5l9v-3Z_789zY/exec"; // <-- Pastikan URL GAS Anda benar!

        async function fetchLeadsData() {
            const loading = document.getElementById("loading-indicator");
            const tbody = document.getElementById("leads-table-body");
            
            loading.classList.remove("hidden");
            loading.innerText = "Memuat data dari Google Sheets...";

            try {
                const response = await fetch(WEB_APP_URL);
                if (!response.ok) throw new Error("Jaringan bermasalah");
                
                const rawData = await response.json();
                
                // FILTER: Ambil hanya baris yang punya Nama Coffee Shop untuk memastikan data bersih
                const data = rawData.filter(item => item["Nama Coffee Shop"] && String(item["Nama Coffee Shop"]).trim() !== "");
                
                // Urutkan data berdasarkan tanggal terbaru
                data.reverse();

                // Hitung Metrik Ringkas
                let totalLeads = data.length;
                let totalClosing = data.filter(item => String(item["Closing"]).toLowerCase().includes("closing")).length;
                let totalOnGoing = data.filter(item => String(item["Closing"]).toLowerCase().includes("go") || String(item["Closing"]).trim() === "" || String(item["Closing"]).toLowerCase().includes("ongoing")).length;

                document.getElementById("metric-total").innerText = totalLeads;
                document.getElementById("metric-closing").innerText = totalClosing;
                document.getElementById("metric-ongoing").innerText = totalOnGoing;

                // Render ke dalam tabel HTML
                tbody.innerHTML = "";
                data.forEach(item => {
                    const row = document.createElement("tr");
                    row.className = "hover:bg-zinc-800/50 transition-colors";

                    // Logika Styling Badge Status
                    let statusBadge = "";
                    const statusVal = String(item["Closing"] || "On Going").trim();
                    if (statusVal.toLowerCase() === "closing") {
                        statusBadge = `<span class="px-2 py-0.5 text-xs font-semibold rounded bg-emerald-950 text-emerald-400 border border-emerald-800">Closing</span>`;
                    } else if (statusVal.toLowerCase() === "stop") {
                        statusBadge = `<span class="px-2 py-0.5 text-xs font-semibold rounded bg-rose-950 text-rose-400 border border-rose-800">Stop</span>`;
                    } else {
                        statusBadge = `<span class="px-2 py-0.5 text-xs font-semibold rounded bg-amber-950 text-amber-400 border border-amber-800">On Going</span>`;
                    }

                    // Format tanggal standar
                    let formatTanggal = item["Tanggal"] ? new Date(item["Tanggal"]).toLocaleDateString('id-ID') : '-';

                    row.innerHTML = `
                        <td class="p-4 text-zinc-400 font-mono">${formatTanggal}</td>
                        <td class="p-4 font-bold text-zinc-200">
                            ${item["Nama Coffee Shop"] || '-'}
                            <div class="text-xs font-normal text-zinc-500 mt-0.5">${item["Area"] || ''}</div>
                        </td>
                        <td class="p-4 text-zinc-300">${item["Sales"] || '-'}</td>
                        <td class="p-4">
                            <div class="text-zinc-200">${item["Nama PIC"] || '-'}</div>
                            <div class="text-xs text-zinc-500 font-mono mt-0.5">${item["Telp PIC"] || '-'}</div>
                        </td>
                        <td class="p-4">
                            <span class="px-2 py-0.5 text-xs font-medium rounded bg-zinc-800 text-zinc-300">${item["Visit Ke"] || 'Pertama'}</span>
                        </td>
                        <td class="p-4">${statusBadge}</td>
                    `;
                    tbody.appendChild(row);
                });

                loading.classList.add("hidden");
            } catch (error) {
                console.error("Error:", error);
                loading.innerText = "Gagal memuat data sheet.";
                loading.classList.remove("text-amber-500");
                loading.classList.add("text-rose-500");
            }
        }

        // Jalankan saat dokumen siap
        window.addEventListener("DOMContentLoaded", fetchLeadsData);
    </script>
</body>
</html>
